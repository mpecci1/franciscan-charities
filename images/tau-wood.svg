<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 134" width="120" height="134" role="img" aria-label="Carved olive-wood Franciscan Tau cross">
  <defs>
    <linearGradient id="wood" x1="0.12" y1="0" x2="0.62" y2="1">
      <stop offset="0" stop-color="#D9BA7C"/>
      <stop offset="0.18" stop-color="#C59B57"/>
      <stop offset="0.40" stop-color="#AA7F40"/>
      <stop offset="0.60" stop-color="#BB8E4C"/>
      <stop offset="0.80" stop-color="#9B6F37"/>
      <stop offset="1" stop-color="#825A2C"/>
    </linearGradient>
    <path id="tau" d="M10 42 Q60 58 110 42 Q113 50 108 68 Q104 74 92 76 Q76 78 73 84 Q74 104 80 122 Q82 128 76 128 Q56 130 40 131 Q34 131 36 124 Q42 104 43 84 Q40 78 28 76 Q16 74 12 68 Q7 50 10 42 Z"/>
    <clipPath id="tw"><use href="#tau"/></clipPath>
    <filter id="sh" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="3.5" stdDeviation="3.5" flood-color="#3A2A14" flood-opacity="0.38"/>
    </filter>
  </defs>

  <g filter="url(#sh)">
    <use href="#tau" fill="url(#wood)" stroke="#6B4A24" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- grain -->
  <g clip-path="url(#tw)" opacity="0.42" stroke="#79552E" fill="none" stroke-width="1.3" stroke-linecap="round">
    <path d="M52 80 Q54 104 57 130"/>
    <path d="M60 80 Q62 104 64 130"/>
    <path d="M67 82 Q69 104 72 128"/>
    <path d="M14 52 Q60 64 108 52"/>
    <path d="M15 62 Q60 72 106 62"/>
  </g>

  <!-- bevel highlight -->
  <g clip-path="url(#tw)" opacity="0.55" stroke="#ECD6A4" fill="none" stroke-width="1.6" stroke-linecap="round">
    <path d="M16 45 Q60 60 104 45"/>
    <path d="M48 86 Q46 104 41 123"/>
  </g>
</svg>
